<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hari's Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="player-card">
        <div class="album-art"></div>
        <h2 id="song-title">Pavazhamalli</h2>
        <p id="artist">Devaa</p>
        
        <div class="time-display">
            <span id="current-time">0:00</span>
            <span id="total-time">0:00</span>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        
        <div class="controls">
            <button id="prev-btn" title="Previous (P)">⏮</button>
            <button id="play-btn" title="Play/Pause (Space)">▶</button>
            <button id="next-btn" title="Next (N)">⏭</button>
            <button id="shuffle-btn" title="Shuffle (S)">🔀</button>
            <button id="repeat-btn" title="Repeat (R)">🔁</button>
        </div>

        <div class="volume-container">
            <span>🔊</span>
            <input type="range" id="volume-slider" min="0" max="100" value="70">
            <span id="volume-percent">70%</span>
        </div>

        <div class="playlist-display">
            <p id="playlist-info">1 / 3</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
